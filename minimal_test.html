<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <div id="ai-writer-toggle" style="position: fixed; right: 0; top: 50%; transform: translateY(-50%); background: linear-gradient(135deg, #0ea5e9 0%, #14b8a6 100%); color: white; padding: 18px 12px; border-radius: 14px 0 0 14px; cursor: pointer; z-index: 99999;">✨ AI 助手</div>
    <div id="ai-writer-panel" style="position: fixed; right: -420px; top: 50%; transform: translateY(-50%); width: 420px; background: #fff; border-radius: 20px 0 0 20px; box-shadow: -10px 0 60px rgba(0, 0, 0, 0.15); z-index: 99998;">
        <div style="padding: 28px;">
            <h3>AIPen 智能写作</h3>
            <p>测试</p>
        </div>
    </div>
    <script>
    (function() {
        const toggleBtn = document.getElementById("ai-writer-toggle");
        const panel = document.getElementById("ai-writer-panel");
        const actionUrl = window.location.origin.replace(/\/+$/, "") + "/AIPen/Action";
        let isPanelOpen = false;
        
        function togglePanel() {
            isPanelOpen = !isPanelOpen;
            if (isPanelOpen) {
                panel.style.right = "0";
                toggleBtn.style.opacity = "0";
            } else {
                panel.style.right = "-420px";
                toggleBtn.style.opacity = "1";
            }
        }
        
        toggleBtn.addEventListener("click", togglePanel);
        console.log("Action URL:", actionUrl);
    })();
    </script>
</body>
</html>
